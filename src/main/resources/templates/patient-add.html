<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:action="@{/patients/save}" th:object="${patient}" method="post">
    <div>
        Mã BN: <input type="text" th:field="*{id}">
        <p th:if="${#fields.hasErrors('id')}" th:errors="*{id}" style="color:red"></p>
    </div>
    <div>
        Họ tên: <input type="text" th:field="*{fullName}">
        <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" style="color:red"></p>
    </div>
    <button type="submit">Lưu bệnh nhân</button>
</form>
</body>
</html>
